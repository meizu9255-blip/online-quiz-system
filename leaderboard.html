<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizKZ - Рейтинг</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<script>
  (function() {
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.classList.add('dark-mode');
    }
  })();
</script>
<body>
  <nav class="navbar">
    <a href="dashboard.html" class="logo"><span>Quiz</span>KZ</a>
    <button class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
    <ul class="nav-links" id="navLinks">
      <li><a href="dashboard.html">Басты бет</a></li>
      <li><a href="results.html">Нәтижелер</a></li>
      <li><a href="leaderboard.html" class="active">Рейтинг</a></li>
      <li><a href="profile.html">Профиль</a></li>
    </ul>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="btn-theme" id="themeToggle" onclick="toggleTheme()"><span id="themeIcon">L</span></button>
      <div class="nav-user" id="navUser"></div>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1>Рейтинг кестесі</h1>
      <p>Барлық пайдаланушылардың ең жоғары нәтижелері</p>
    </div>

    <!-- Топ 3 -->
    <div class="top-three" id="topThree"></div>

    <!-- Толық рейтинг -->
    <div class="results-table-container">
      <table class="results-table">
        <thead>
          <tr>
            <th>Орын</th>
            <th>Пайдаланушы</th>
            <th>Тесттер саны</th>
            <th>Орташа балл</th>
            <th>Ең жоғары</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody"></tbody>
      </table>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 QuizKZ — Онлайн тест тапсыру жүйесі</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/leaderboard.js"></script>
    <script src="js/theme.js"></script>
    <script>applyThemeIcon();</script>
</body>
</html>
